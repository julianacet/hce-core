services:
  hce-db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT}:5432"

  hce-api:
    build: ./api
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-api
    restart: always
    depends_on:
      - hce-db
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${COMPOSE_PROJECT_NAME:-hce}-db:5432/${DB_NAME}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${DOCKER_API_PORT}
      ALLOWED_ORIGIN: ${DOCKER_ALLOWED_ORIGIN}
    ports:
      - "${DOCKER_API_PORT}:${DOCKER_API_PORT}"

  hce-ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: ${DOCKER_VITE_API_URL}
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-ui
    restart: always
    ports:
      - "${UI_PORT}:80"
