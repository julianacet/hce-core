services:
  hce-db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-hce_provider}
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"

  hce-api:
    build: ./api
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-api
    restart: always
    depends_on:
      - hce-db
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${COMPOSE_PROJECT_NAME:-hce}-db:5432/${DB_NAME:-hce_provider}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-8000}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"

  hce-ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-ui
    restart: always
    ports:
      - "${UI_PORT:-80}:80"
