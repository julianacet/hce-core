services:
  hce-db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./db/seed_divipola.sql:/docker-entrypoint-initdb.d/02_seed_divipola.sql
      - ./db/seed_ocupaciones.sql:/docker-entrypoint-initdb.d/03_seed_ocupaciones.sql
      - ./db/seed_eps.sql:/docker-entrypoint-initdb.d/04_seed_eps.sql
      - ./db/seed_medicamentos.sql:/docker-entrypoint-initdb.d/05_seed_medicamentos.sql

  hce-api:
    build: ./api
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-api
    restart: unless-stopped
    depends_on:
      hce-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${COMPOSE_PROJECT_NAME:-hce}-db:5432/${DB_NAME}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${DOCKER_API_PORT}
      ALLOWED_ORIGIN: ${DOCKER_ALLOWED_ORIGIN}
      APP_TZ: ${APP_TZ:-America/Bogota}
      TZ: ${APP_TZ:-America/Bogota}
    ports:
      - "${DOCKER_API_PORT}:${DOCKER_API_PORT}"

  hce-ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: ${DOCKER_VITE_API_URL}
    container_name: ${COMPOSE_PROJECT_NAME:-hce}-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT}:80"
